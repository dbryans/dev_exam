server:
  port: 8080

spring:
  application:
    name: dev-exam 

  datasource:
    url: jdbc:mysql://localhost:3310/exam_db
    username: generic_user
    password: generic_pass_db
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  rabbitmq:
    host: localhost
    port: 5672
    username: generic_user
    password: generic_pass_rabbit

# Quueue and exchange config
app:
  rabbitmq:
    exchange: exam.exchange
    queue:
      email: exam.email.queue
      audit: exam.audit.queue